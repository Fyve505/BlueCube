<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Console v3</title>

<link rel="icon" href="more/favicon.png">

<style>
  body, html {
    margin: 0;
    padding: 0;
    background: black;
    font-family: 'Courier New', monospace;
    height: 100%;
    overflow: hidden;
  }

  #title-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: #aaa;
    padding: 5px 10px;
    font-size: 13px;
    border-bottom: 1px solid #333;
    z-index: 200;
  }

  #terminal {
    padding: 30px 10px 60px 10px;
    overflow-y: auto;
    height: 100vh;
    box-sizing: border-box;
    color: #00aa00;
  }

  .output {
    white-space: pre-wrap;
    word-wrap: break-word;
    padding: 2px 0;
  }

  #input-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: black;
    padding: 8px;
    display: flex;
    align-items: center;
    border-top: 1px solid #003300;
  }

  .prompt {
    margin-right: 5px;
    color: #00aa00;
  }

  #input {
    background: none;
    border: none;
    outline: none;
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    color: #00aa00;
  }
</style>
</head>

<body>

<div id="title-bar">Console v3</div>
<div id="terminal"></div>

<div id="input-container">
  <span class="prompt">C:\></span>
  <input type="text" id="input" autofocus />
</div>

<script>
  const terminal = document.getElementById("terminal");
  const input = document.getElementById("input");
  const titleBar = document.getElementById("title-bar");

  let currentColor = "#00aa00";

  // CMD COLOR MAP (0–F like real Windows CMD)
  const colorMap = {
    "0": "#000000", // black
    "1": "#0000aa", // blue
    "2": "#00aa00", // green
    "3": "#00aaaa", // cyan
    "4": "#aa0000", // red
    "5": "#aa00aa", // magenta
    "6": "#aa5500", // yellow/brown
    "7": "#aaaaaa", // light gray
    "8": "#555555", // dark gray
    "9": "#5555ff", // light blue
    "a": "#55ff55", // light green
    "b": "#55ffff", // light cyan
    "c": "#ff5555", // light red
    "d": "#ff55ff", // pink
    "e": "#ffff55", // yellow
    "f": "#ffffff"  // white
  };

  function applyColor(code) {
    if (!code) return;

    code = code.toLowerCase();

    // CMD format: 0F = bg + fg → we only use FG for simplicity
    const fg = code[1] || code[0];

    const color = colorMap[fg];

    if (!color) {
      print("Invalid color code. Use like: color 0f");
      return;
    }

    currentColor = color;
    terminal.style.color = color;
    input.style.color = color;
    document.querySelector(".prompt").style.color = color;
  }

  function print(text) {
    const div = document.createElement("div");
    div.className = "output";
    div.style.color = currentColor;
    div.textContent = text;
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const cmd = input.value.trim();
      input.value = "";
      runCommand(cmd);
    }
  });

  function runCommand(cmd) {
    if (!cmd) return;

    print("C:\\> " + cmd);

    const parts = cmd.split(" ");
    const base = parts[0].toLowerCase();

    // CLS
    if (base === "cls") {
      terminal.innerHTML = "";
      return;
    }

    // TITLE
    if (base === "title") {
      const newTitle = cmd.slice(6).trim();
      const finalTitle = newTitle || "Console v3";
      titleBar.textContent = finalTitle;
      document.title = finalTitle;
      return;
    }

    // COLOR (CMD STYLE)
    if (base === "color") {
      const code = parts[1];
      if (!code) {
        print("Usage: color 0f");
        return;
      }
      applyColor(code);
      return;
    }

    print("'" + cmd + "' is not recognized as a command.");
  }

  document.addEventListener("click", () => input.focus());
</script>

</body>
</html>
