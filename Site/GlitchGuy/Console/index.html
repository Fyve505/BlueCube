<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Console v3</title>
<link rel="icon" href="/more/favicon.png">

<style>
  :root {
    --fg: #00aa00;
    --bg: #000000;
    --title-bg: #111111;
    --title-fg: #aaaaaa;
    --input-bg: #000000;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Courier New", monospace;
  }

  #title-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    background: var(--title-bg);
    color: var(--title-fg);
    padding: 5px 10px;
    font-size: 13px;
    border-bottom: 1px solid #333;
    z-index: 200;
    user-select: none;
  }

  #terminal {
    position: relative;
    height: 100vh;
    box-sizing: border-box;
    padding: 30px 10px 56px 10px;
    overflow-y: auto;
    background: var(--bg);
    color: var(--fg);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .output {
    white-space: pre-wrap;
    word-wrap: break-word;
    padding: 1px 0;
  }

  #input-container {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--input-bg);
    border-top: 1px solid #003300;
    z-index: 150;
  }

  .prompt {
    color: var(--fg);
    flex: 0 0 auto;
    user-select: none;
  }

  #input {
    flex: 1 1 auto;
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    font-size: 14px;
    color: var(--fg);
    caret-color: currentColor;
    min-width: 0;
  }

  #boot {
    position: fixed;
    inset: 0;
    background: #000;
    color: #00aa00;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
    white-space: pre-wrap;
  }

  #boot-text {
    margin: 0;
  }
</style>
</head>

<body>
  <div id="boot"><pre id="boot-text"></pre></div>

  <div id="title-bar">Console v3</div>
  <div id="terminal"></div>

  <div id="input-container">
    <span class="prompt">C:\></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus />
  </div>

<script>
(() => {
  const terminal = document.getElementById("terminal");
  const input = document.getElementById("input");
  const titleBar = document.getElementById("title-bar");
  const prompt = document.querySelector(".prompt");
  const boot = document.getElementById("boot");
  const bootText = document.getElementById("boot-text");

  const colorMap = {
    "0": "#000000",
    "1": "#0000aa",
    "2": "#00aa00",
    "3": "#00aaaa",
    "4": "#aa0000",
    "5": "#aa00aa",
    "6": "#aa5500",
    "7": "#aaaaaa",
    "8": "#555555",
    "9": "#5555ff",
    "a": "#55ff55",
    "b": "#55ffff",
    "c": "#ff5555",
    "d": "#ff55ff",
    "e": "#ffff55",
    "f": "#ffffff"
  };

  const helpData = {
    cls: {
      usage: "cls",
      desc: "Clears the screen."
    },
    color: {
      usage: "color XY",
      desc: "Changes colors. X = background, Y = text. Example: color 0f"
    },
    title: {
      usage: "title [text]",
      desc: "Changes the window title."
    },
    echo: {
      usage: "echo [text]",
      desc: "Prints text to the screen."
    },
    help: {
      usage: "help [command]",
      desc: "Shows help for commands."
    },
    calc: {
      usage: "calc 2+2",
      desc: "Calculates simple math using +, -, /, and x."
    },
    clearhistory: {
      usage: "clearhistory",
      desc: "Clears saved command history."
    },
    matrix: {
      usage: "matrix",
      desc: "Runs a Matrix-style screen effect."
    },
    dir: {
      usage: "dir",
      desc: "Shows a fake directory listing."
    },
    time: {
      usage: "time",
      desc: "Shows the current time."
    },
    date: {
      usage: "date",
      desc: "Shows the current date."
    }
  };

  function loadLS(key, fallback) {
    try {
      const v = localStorage.getItem(key);
      return v === null ? fallback : v;
    } catch {
      return fallback;
    }
  }

  function saveLS(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem("history");
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }

  let fgColor = loadLS("fg", "#00aa00");
  let bgColor = loadLS("bg", "#000000");
  let savedTitle = loadLS("title", "Console v3");
  let history = loadHistory();
  let historyIndex = history.length;

  titleBar.textContent = savedTitle;
  document.title = savedTitle;

  function saveState() {
    saveLS("fg", fgColor);
    saveLS("bg", bgColor);
    saveLS("title", document.title);
    try {
      localStorage.setItem("history", JSON.stringify(history.slice(-200)));
    } catch {}
  }

  function applyTheme() {
    document.documentElement.style.setProperty("--fg", fgColor);
    document.documentElement.style.setProperty("--bg", bgColor);

    terminal.style.background = bgColor;
    terminal.style.color = fgColor;

    input.style.color = fgColor;
    prompt.style.color = fgColor;
  }

  function print(text) {
    const line = document.createElement("div");
    line.className = "output";
    line.style.color = fgColor;
    line.textContent = String(text);
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function cmdNotFound(cmd) {
    print(`'${cmd}' is not recognized as an internal or external command.`);
  }

  function setColor(code) {
    if (!code || code.length < 2) {
      print("Usage: color XY");
      print("Example: color f0");
      return;
    }

    code = code.toLowerCase();
    const bg = colorMap[code[0]];
    const fg = colorMap[code[1]];

    if (!bg || !fg) {
      print("Invalid color code.");
      print("Use hex digits 0-9 or a-f like: color f0");
      return;
    }

    bgColor = bg;
    fgColor = fg;
    applyTheme();
    saveState();
  }

  function tokenizeExpression(expr) {
    const cleaned = expr.replace(/\s+/g, "").replace(/x/gi, "*");
    if (!cleaned) return null;
    if (!/^[0-9+\-*/.]+$/.test(cleaned)) return null;

    const tokens = [];
    let i = 0;

    while (i < cleaned.length) {
      const ch = cleaned[i];

      const prev = tokens.length ? tokens[tokens.length - 1] : null;
      const prevIsOp = prev && prev.type === "op";

      const canBeUnaryMinus = ch === "-" && (i === 0 || prevIsOp);
      const isNumberStart = /[0-9.]/.test(ch) || canBeUnaryMinus;

      if (isNumberStart) {
        let num = "";
        if (canBeUnaryMinus) {
          num += "-";
          i++;
        }

        let dotCount = 0;
        while (i < cleaned.length && /[0-9.]/.test(cleaned[i])) {
          if (cleaned[i] === ".") dotCount++;
          num += cleaned[i];
          i++;
        }

        if (num === "-" || num === "." || num === "-.") return null;
        if ((num.match(/\./g) || []).length > 1) return null;

        const value = Number(num);
        if (!Number.isFinite(value)) return null;

        tokens.push({ type: "num", value });
        continue;
      }

      if ("+-*/".includes(ch)) {
        tokens.push({ type: "op", value: ch });
        i++;
        continue;
      }

      return null;
    }

    if (tokens.length === 0) return null;
    if (tokens[tokens.length - 1].type === "op") return null;

    return tokens;
  }

  function evaluateExpression(expr) {
    const tokens = tokenizeExpression(expr);
    if (!tokens) return { ok: false, error: "Invalid expression." };

    const prec = { "+": 1, "-": 1, "*": 2, "/": 2 };
    const output = [];
    const ops = [];

    for (const token of tokens) {
      if (token.type === "num") {
        output.push(token);
      } else {
        while (ops.length) {
          const top = ops[ops.length - 1];
          if (prec[top.value] >= prec[token.value]) {
            output.push(ops.pop());
          } else {
            break;
          }
        }
        ops.push(token);
      }
    }

    while (ops.length) output.push(ops.pop());

    const stack = [];
    for (const token of output) {
      if (token.type === "num") {
        stack.push(token.value);
      } else {
        if (stack.length < 2) return { ok: false, error: "Invalid expression." };
        const b = stack.pop();
        const a = stack.pop();

        let result;
        switch (token.value) {
          case "+": result = a + b; break;
          case "-": result = a - b; break;
          case "*": result = a * b; break;
          case "/":
            if (b === 0) return { ok: false, error: "Division by zero." };
            result = a / b;
            break;
          default:
            return { ok: false, error: "Invalid expression." };
        }
        stack.push(result);
      }
    }

    if (stack.length !== 1) return { ok: false, error: "Invalid expression." };

    return { ok: true, value: stack[0] };
  }

  function showHelp(arg) {
    if (arg) {
      const key = arg.toLowerCase();
      const item = helpData[key];
      if (!item) {
        print(`No help found for '${arg}'.`);
        return;
      }
      print(`${key}`);
      print(`Usage: ${item.usage}`);
      print(`${item.desc}`);
      return;
    }

    print("Available commands:");
    Object.keys(helpData).forEach(cmd => print(`  ${cmd}`));
    print("Type: help <command>");
  }

  function showDir() {
    print(" Volume in drive C has no label.");
    print(" Volume Serial Number is 0000-0000");
    print("");
    print(" Directory of C:\\");
    print("");
    print("01/01/2026  12:00 AM    <DIR>          Windows");
    print("01/01/2026  12:00 AM    <DIR>          Users");
    print("01/01/2026  12:00 AM    <DIR>          Program Files");
    print("01/01/2026  12:00 AM             1,024 readme.txt");
    print("               1 File(s)          1,024 bytes");
    print("               3 Dir(s)  999,999,999 bytes free");
  }

  function showTime() {
    const now = new Date();
    print(now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }));
  }

  function showDate() {
    const now = new Date();
    print(now.toLocaleDateString([], { year: "numeric", month: "2-digit", day: "2-digit" }));
  }

  function runMatrix() {
    terminal.innerHTML = "";
    const chars = "01";
    let ticks = 0;

    const interval = setInterval(() => {
      let line = "";
      for (let i = 0; i < 80; i++) {
        line += chars[(Math.random() * 2) | 0];
      }
      print(line);
      ticks++;
      if (ticks >= 55) {
        clearInterval(interval);
        print("Matrix stopped.");
      }
    }, 50);
  }

function runCommand(raw) {
  const line = raw.trim();
  if (!line) return;

  // split by && (CMD chaining)
  const chain = line.split("&&").map(c => c.trim()).filter(Boolean);

  for (let cmd of chain) {
    const parts = cmd.split(/\s+/);
    const base = parts[0].toLowerCase();

    history.push(cmd);
    history = history.slice(-200);
    historyIndex = history.length;
    saveState();

    print(`C:\\> ${cmd}`);

    // ---- COMMANDS ----

    if (base === "cls") {
      terminal.innerHTML = "";
      continue;
    }

    if (base === "title") {
      const newTitle = cmd.slice(6).trim();
      const finalTitle = newTitle || "Console v3";
      titleBar.textContent = finalTitle;
      document.title = finalTitle;
      saveState();
      continue;
    }

    if (base === "color") {
      setColor(parts[1]);
      continue;
    }

    if (base === "echo") {
      print(cmd.slice(5));
      continue;
    }

    if (base === "help") {
      showHelp(parts[1]);
      continue;
    }

    if (base === "clearhistory") {
      history = [];
      historyIndex = 0;
      saveState();
      print("History cleared.");
      continue;
    }

    if (base === "dir") {
      showDir();
      continue;
    }

    if (base === "time") {
      showTime();
      continue;
    }

    if (base === "date") {
      showDate();
      continue;
    }

    if (base === "matrix") {
      runMatrix();
      continue;
    }

    if (base === "calc") {
      const expr = cmd.slice(5).trim();
      if (!expr) {
        print("Usage: calc 2+2");
        continue;
      }

      const result = evaluateExpression(expr);
      if (!result.ok) {
        print(result.error);
        continue;
      }

      print(`${expr} = ${result.value}`);
      continue;
    }

    cmdNotFound(cmd);
  }
}

  function playKeySound(key) {
    try {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      if (!window.__cmdAudioCtx) {
        window.__cmdAudioCtx = new AudioContextClass();
      }

      const ctx = window.__cmdAudioCtx;
      if (ctx.state === "suspended") ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "square";
      osc.frequency.value = key === "Enter" ? 180 : 260;

      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.03, ctx.currentTime + 0.002);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.02);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.022);
    } catch {}
  }

  function handleKeyDown(e) {
    if (e.key === "Enter") {
      const value = input.value;
      input.value = "";
      runCommand(value);
      return;
    }

    if (e.key === "ArrowUp") {
      if (history.length === 0) return;
      e.preventDefault();
      historyIndex = Math.max(0, historyIndex - 1);
      input.value = history[historyIndex] || "";
      queueMicrotask(() => {
        try {
          input.setSelectionRange(input.value.length, input.value.length);
        } catch {}
      });
      return;
    }

    if (e.key === "ArrowDown") {
      if (history.length === 0) return;
      e.preventDefault();
      historyIndex = Math.min(history.length, historyIndex + 1);
      input.value = historyIndex >= history.length ? "" : (history[historyIndex] || "");
      queueMicrotask(() => {
        try {
          input.setSelectionRange(input.value.length, input.value.length);
        } catch {}
      });
      return;
    }

    if (e.key === "Tab") {
      e.preventDefault();
      const typed = input.value.trim().toLowerCase();
      if (!typed) return;

      const commandList = Object.keys(helpData);
      const match = commandList.find(c => c.startsWith(typed));
      if (match) {
        input.value = match + " ";
      }
      return;
    }

    if (
      e.key.length === 1 ||
      e.key === "Backspace" ||
      e.key === "Delete" ||
      e.key === "Spacebar"
    ) {
      playKeySound(e.key);
    }
  }

  input.addEventListener("keydown", handleKeyDown);
  document.addEventListener("click", () => input.focus());
  window.addEventListener("focus", () => input.focus());

  function startBoot() {
    const lines = [
      "Booting Console v3...",
      "Loading shell modules...",
      "Mounting terminal...",
      "Starting services...",
      "Ready."
    ];

    let i = 0;
    const step = () => {
      if (i < lines.length) {
        bootText.textContent += lines[i] + "\n";
        i++;
        setTimeout(step, 350);
      } else {
        setTimeout(() => {
          boot.style.display = "none";
          input.focus();
        }, 450);
      }
    };

    step();
  }

  applyTheme();
  startBoot();

  if (history.length === 0) {
    print("Type help for commands.");
  }
})();
</script>
</body>
</html>
